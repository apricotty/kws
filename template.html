<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="1800">
    <title>Kindle Dashboard</title>
    <style>
        body { font-family: monospace; color: #000; background-color: #fff; margin: 0; padding: 20px; width: 540px; }
        .container { border: 2px solid #000; padding: 20px; }
        .header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .date-box { font-size: 48px; font-weight: bold; }
        .weather-box { float: right; text-align: right; font-size: 20px; font-weight: bold}
        .city-box { font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .calendar-table { width: 100%; border-collapse: collapse; font-size: 20px; margin-top: 20px; }
        .calendar-table th, .calendar-table td { text-align: center; padding: 8px; }
        .current-day { background-color: #000; color: #fff; font-weight: bold; }
        .footer { margin-top: 20px; font-size: 14px; text-align: center; border-top: 1px solid #000; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="weather-box">
                <div class="city-box">{{CITY}}</div>
                <div>{{WEATHER_DESC}}</div>
                <div>{{TEMPERATURE}}°C</div>
                <div>{{WIND}}</div>
            </div>
            <div class="date-box">{{DAY}}</div>
            <div>{{WEEKDAY}}</div>
            <div>{{YEAR_MONTH}}</div>
        </div>
        <div style="clear: both;"></div>
        {{CALENDAR_TABLE}}
        <div class="footer">
            最后更新  {{UPDATE_TIME}}
        </div>
    </div>
</body>
</html>
