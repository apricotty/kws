<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="3600">
    <title>Kindle Dashboard</title>
    <style>
        body { font-family: monospace; color: #000; background-color: #fff; margin: 0; padding: 20px; width: 540px; }
        .container { border: 2px solid #000; padding: 20px; }
        .header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .date-box { font-size: 48px; font-weight: bold; }
        .weather-box { float: right; text-align: right; font-size: 24px; }
        .calendar-table { width: 100%; border-collapse: collapse; font-size: 20px; margin-top: 20px; }
        .calendar-table th, .calendar-table td { text-align: center; padding: 8px; }
        .current-day { border: 2px solid #000; font-weight: bold; }
        .footer { margin-top: 20px; font-size: 14px; text-align: center; border-top: 1px solid #000; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="weather-box">
                <div>雷阵雨</div>
                <div>32.1°C</div>
                <div>风速 15.2 km/h</div>
            </div>
            <div class="date-box">28</div>
            <div>星期日</div>
            <div>2026年6月</div>
        </div>
        <div style="clear: both;"></div>
        <table class="calendar-table">
<tr><th colspan="7" class="month">June 2026</th></tr>
<tr><th class="sun">Sun</th><th class="mon">Mon</th><th class="tue">Tue</th><th class="wed">Wed</th><th class="thu">Thu</th><th class="fri">Fri</th><th class="sat">Sat</th></tr>
<tr><td class="noday">&nbsp;</td><td class="mon">1</td><td class="tue">2</td><td class="wed">3</td><td class="thu">4</td><td class="fri">5</td><td class="sat">6</td></tr>
<tr><td class="sun">7</td><td class="mon">8</td><td class="tue">9</td><td class="wed">10</td><td class="thu">11</td><td class="fri">12</td><td class="sat">13</td></tr>
<tr><td class="sun">14</td><td class="mon">15</td><td class="tue">16</td><td class="wed">17</td><td class="thu">18</td><td class="fri">19</td><td class="sat">20</td></tr>
<tr><td class="sun">21</td><td class="mon">22</td><td class="tue">23</td><td class="wed">24</td><td class="thu">25</td><td class="fri">26</td><td class="sat">27</td></tr>
<tr><td class="sun" class="current-day">28</td><td class="mon">29</td><td class="tue">30</td><td class="noday">&nbsp;</td><td class="noday">&nbsp;</td><td class="noday">&nbsp;</td><td class="noday">&nbsp;</td></tr>
</table>

        <div class="footer">
            每60分钟刷新 | 更新于: 2026-06-28 10:19:56
        </div>
    </div>
</body>
</html>
